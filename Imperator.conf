## name: Imperator
## author: ziegler
## license: MIT
## blurb: Amber CRT sci-fi theme inspired by retro monitor interfaces

# Imperator — Kitty Terminal Theme
# Install in: ~/.config/kitty/themes/Imperator.conf
# Enable by adding to kitty.conf:
#   include themes/Imperator.conf
# Or via: kitty +kitten themes

# ── Background and base text ─────────────────────────────
background            #0E0C08
foreground            #D4A843

# ── Cursor ───────────────────────────────────────────────
cursor                #FFD700
cursor_text_color     #0E0C08

# ── Selection ────────────────────────────────────────────
selection_background  #1E1808
selection_foreground  #FFD700

# ── URL ──────────────────────────────────────────────────
url_color             #5B8DA8
url_style             curly

# ── Window borders ───────────────────────────────────────
active_border_color   #C8960C
inactive_border_color #2A2010
bell_border_color     #FF6B2B

# ── Tabs ─────────────────────────────────────────────────
active_tab_background   #1E1808
active_tab_foreground   #FFD700
active_tab_font_style   bold
inactive_tab_background #0E0C08
inactive_tab_foreground #8A7040
inactive_tab_font_style normal
tab_bar_background      #0E0C08
tab_bar_margin_color    #0E0C08

# ── ANSI colors ──────────────────────────────────────────

# Black
color0  #0E0C08
color8  #3A2E10

# Red  →  Plasma Red
color1  #C84830
color9  #FF6B2B

# Green  →  Radar Green
color2  #6D9860
color10 #8DB87A

# Yellow  →  Amber Pulse / Golden Signal
color3  #C8960C
color11 #FFD700

# Blue  →  Signal Blue
color4  #5B8DA8
color12 #7AAEC8

# Magenta  →  Violet Static / Warm Brass bright
color5  #9870A0
color13 #C89860

# Cyan  →  Cathode Teal
color6  #5AADA8
color14 #7ACAB0

# White  →  Amber Light / Solar Flare
color7  #D4A843
color15 #F0B030
