# vim:fileencoding=utf-8:foldmethod=marker

#: Fonts {{{
font_family      JetBrainsMonoNL Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
disable_ligatures never
font_features    +ss01 +ss02
#: }}}

#: Cursor {{{
cursor_shape           block
cursor_shape_unfocused hollow
cursor_blink_interval  0.7
#: }}}

#: Scrollback {{{
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
#: }}}

#: Mouse {{{
mouse_hide_wait       3.0
copy_on_select        clipboard
strip_trailing_spaces smart
focus_follows_mouse   yes
#: }}}

#: Performance {{{
repaint_delay   10
input_delay     3
sync_to_monitor yes
#: }}}

#: Bell {{{
enable_audio_bell    no
visual_bell_duration 0.0
#: }}}

#: Window {{{
window_padding_width       20 25
window_margin_width        0
single_window_margin_width 0
hide_window_decorations    no
window_border_width        2.0
#: }}}

#: Tab bar {{{
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_align         left
tab_bar_min_tabs      2
tab_bar_margin_width  0.0
tab_bar_margin_height 2.5 1.5
tab_bar_margin_color  #0E0C08
tab_bar_background    #0E0C08

active_tab_foreground   #0E0C08
active_tab_background   #FFD700
active_tab_font_style   bold
inactive_tab_foreground #8A7040
inactive_tab_background #141008
inactive_tab_font_style normal
tab_activity_symbol     " ◆ "

tab_title_template        "{fmt.fg._FF6B2B}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title[:30]}{title[30:] and '…'} [{index}]"
active_tab_title_template "{fmt.fg._FF6B2B}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title[:30]}{title[30:] and '…'} [{index}]"
#: }}}

#: Background — frosted glass {{{
background_opacity 0.55
background_blur    64
#: }}}

#: Advanced {{{
shell_integration         no-cursor
text_composition_strategy legacy
#: }}}

#: Theme {{{
# BEGIN_KITTY_THEME
# Imperator
include current-theme.conf
# END_KITTY_THEME
#: }}}

#: Keybindings {{{

# Tabs
map ctrl+shift+t     new_tab
map ctrl+shift+w     close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# Windows / splits
map ctrl+shift+enter new_window
map ctrl+shift+h     launch --location=hsplit
map ctrl+shift+b     launch --location=vsplit

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Font size
map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0     change_font_size all 0

# Misc
map f11 toggle_fullscreen

#: }}}
